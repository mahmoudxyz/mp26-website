# ─────────────────────────────────────────────────────────────
#  MP26 · Molecular Phylogenetics
#  Edit this file to update the whole website.
# ─────────────────────────────────────────────────────────────
#
#  Per-lecture pages:
#    Each lecture can have any number of markdown pages.
#    Add a file at: content/pages/{id}/{pageId}.md
#    Then list it under the lecture's `pages:` array.
#
#    Built-in page ids: practicals, transcript, notes, summary
#    You can invent any id — just create the .md file.
# ─────────────────────────────────────────────────────────────

course:
  title: "Molecular Phylogenetics"
  subtitle: "MSc in Bioinformatics · University of Bologna · 2026"
  github: "https://github.com/for-giobbe/MP26"

resources:
  recordings: 'https://drive.google.com/drive/folders/1uBJ5eLK1M396rmwWbZuh0R_xj33mioAR'
  exam_sample: "/exam"
  single_slides_pack: null

data:
  clone_command: "git clone https://github.com/for-giobbe/MP26.git"
  description: "Course datasets including OrthoFinder results, example alignments, trees, and more."
  folders:
    - name: "OrthoFinder results"
      path: "data/OrthoFinder/"
    - name: "Single copy orthologues"
      path: "data/Single_Copy_Orthologue_Sequences/"
    - name: "Example alignments"
      path: "data/example_alignements/"
    - name: "Example trees"
      path: "data/example_trees/"
    - name: "Example dating"
      path: "data/example_dating/"
    - name: "Example selection"
      path: "data/example_selection/"
    - name: "Proteomes"
      path: "data/proteoms/"

instructors:
  - name: "Giobbe Forni"
    email: "giobbe.forni2@unibo.it"
    role: "Course Curator"
  - name: "Jacopo Martelossi"
    role: "Contributor"
  - name: "Andrea Luchetti"
    role: "Contributor"

